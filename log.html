<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Canteen Login</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ffcc00,#ff6600);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#ff6600;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff3300;
}

</style>
</head>

<body>

<div class="login-box">

<h2>College Canteen Login</h2>

<form onsubmit="loginUser(event)">

<select id="role">
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="teacher">Teacher</option>
<option value="owner">Canteen Owner</option>
</select>

<input type="text" id="username" placeholder="Enter Username" required>

<input type="password" id="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

</div>

<script>

function loginUser(event){

event.preventDefault();

let role=document.getElementById("role").value;
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(role=="student" && user=="student" && pass=="123")
{
alert("Student Login Successful");
window.location="student.html";
}

else if(role=="teacher" && user=="teacher" && pass=="123")
{
alert("Teacher Login Successful");
window.location="teacher.html";
}

else if(role=="owner" && user=="owner" && pass=="123")
{
alert("Canteen Owner Login Successful");
window.location="owner.html";
}

else
{
alert("Invalid Login");
}

}

</script>

</body>
</html>
